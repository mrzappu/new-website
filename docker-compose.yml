version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://ecommerce_user:ecommerce_password@postgres:5432/ecommerce
      - REDIS_URL=redis://redis:6379
      - ANALYTICS_SERVICE_URL=http://analytics-service:8001
      - ML_SERVICE_URL=http://ml-service:8002
      - REPORTING_SERVICE_URL=http://reporting-service:8003
      - PYTHON_API_KEY=your-python-api-key-here
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./frontend/public/uploads:/app/public/uploads
      - ./frontend/views:/app/views

  analytics-service:
    build:
      context: ./python-services/analytics
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://ecommerce_user:ecommerce_password@postgres:5432/ecommerce
      - PYTHON_API_KEY=your-python-api-key-here
    depends_on:
      postgres:
        condition: service_healthy

  ml-service:
    build:
      context: ./python-services/ml
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://ecommerce_user:ecommerce_password@postgres:5432/ecommerce
      - PYTHON_API_KEY=your-python-api-key-here
    depends_on:
      postgres:
        condition: service_healthy

  reporting-service:
    build:
      context: ./python-services/reporting
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://ecommerce_user:ecommerce_password@postgres:5432/ecommerce
      - PYTHON_API_KEY=your-python-api-key-here
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/public:/usr/share/nginx/html
    depends_on:
      - node-backend
      - analytics-service
      - ml-service
      - reporting-service

volumes:
  postgres_data:
  redis_data:
